name: Release

on:
  release:
    types: [published]

jobs:
  release_zip_file:
    name: Prepare release asset
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v2

      - name: Pack Zip
        run: |
          cd ${{ github.workspace }}/custom_components/ml_solar_forecast
          zip ml_solar_forecast.zip -r ./
      - name: Upload zip to release
        uses: svenstaro/upload-release-action@v1-release
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ github.workspace }}/custom_components/ml_solar_forecast/ml_solar_forecast.zip
          asset_name: ml_solar_forecast.zip
          tag: ${{ github.ref }}
          overwrite: true